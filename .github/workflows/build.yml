name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    name: Build cocot46lp (nice_nano_v2)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            modules/
            tools/
            zephyr/
            zmk/
          key: west-3.5-${{ hashFiles('config/west.yml') }}

      - name: Initialize west workspace
        run: west init -l config

      - name: Update west modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build firmware
        run: |
          west build -s zmk/app \
            -b ble_micro_pro \
            -- \
            -DSHIELD=cocot46lp \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename artifact
        run: cp build/zephyr/zmk.uf2 cocot46lp-ble_micro_pro.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cocot46lp-firmware
          path: cocot46lp-ble_micro_pro.uf2
