name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    strategy:
      fail-fast: false
      matrix:
        include:
          # board 2: S140 SoftDevice still resident -> app at 0x26000
          - board: ble_micro_pro
          # board 1: SoftDevice erased -> app at 0x1000
          - board: ble_micro_pro_nosd
    name: Build cocot46lp (${{ matrix.board }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            modules/
            tools/
            zephyr/
            zmk/
          key: west-3.5-${{ hashFiles('config/west.yml') }}

      - name: Initialize west workspace
        run: west init -l config

      - name: Update west modules
        run: west update

      - name: Export Zephyr CMake package
        run: west zephyr-export

      - name: Build firmware
        run: |
          west build -s zmk/app \
            -b ${{ matrix.board }} \
            -S studio-rpc-usb-uart \
            -- \
            -DSHIELD=cocot46lp \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/az1uball_driver"

      - name: Rename artifact
        run: cp build/zephyr/zmk.uf2 cocot46lp-${{ matrix.board }}.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cocot46lp-firmware-${{ matrix.board }}
          path: cocot46lp-${{ matrix.board }}.uf2
