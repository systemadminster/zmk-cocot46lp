# 32 kHz clock: internal RC oscillator (BMP has no external 32 kHz crystal)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# P0.09 (NFC1) and P0.10 (NFC2) are NFC antenna pins by default on nRF52840.
# Row pins 9 and 10 WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# USB only — disable BLE so BLE init cannot block USB startup
CONFIG_ZMK_BLE=n

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=4096

CONFIG_ZMK_PHYSICAL_LAYOUTS_LOG_LEVEL_DBG=y
