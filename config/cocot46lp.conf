# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# BOARD 2 SWD-DEBUG: reproduce the BLE hang with a stable ST-Link SWD link
# attached, so we can halt the core and read the PC / fault registers to find
# exactly where it hangs. Layout 0x26000 (SoftDevice kept). Chip stays
# debug-unlocked via approtect_unlock.c + NRF_APPROTECT_USE_UICR.
CONFIG_ZMK_BLE=y
CONFIG_NRF_APPROTECT_USE_UICR=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# --- FAULT CAPTURE ---
# Reads worked over SWD but the core could not be halted -> the BLE crash was
# rebooting into a reset loop (Zephyr default = reset on fatal). Stop rebooting
# so the core halts in place at the fault (haltable, readable), and route logs
# to RTT over SWD since USB is dead once BLE is on. This lets us read the full
# fault dump (PC, fault reason, stack) via the ST-Link.
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_EXCEPTION_STACK_TRACE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
