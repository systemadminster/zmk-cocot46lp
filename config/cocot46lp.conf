# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# USB only for now. BLE enable causes a full boot hang (no USB, no BLE
# advertising) that survived 5 different fixes (BLE controller choice,
# clock source, log/RAM pressure, disabling our custom kscan driver,
# and fixing a real flash-partition/bootloader overlap bug — kept,
# see ble_micro_pro.dts, but it wasn't the whole story). Diagnosing
# further needs real boot logs, which requires SWD debug probe access
# we don't have yet. BMP does expose SWDIO/SWDCLK test points (schematic
# "W2" connector) for when a probe becomes available.
CONFIG_ZMK_BLE=n

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
