# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# FINAL TEST: BLE enabled on the clean no-SoftDevice layout.
# The stale QMK-era S140 SoftDevice (which occupied 0x1000-0x26000 and fought
# ZMK's own controller for the radio) has been erased, and the app now lives at
# 0x1000. If the SoftDevice was the cause of the total hang, BLE should now come
# up (advertise) with USB still alive.
# NRF_APPROTECT_USE_UICR kept so the chip stays debug-unlocked across resets.
CONFIG_ZMK_BLE=y
CONFIG_NRF_APPROTECT_USE_UICR=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
