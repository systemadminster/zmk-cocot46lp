# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# DIAGNOSTIC BUILD: BLE enabled to capture *why advertising never starts*.
# This is the known-stable state (GPIOTE fix in ble_micro_pro.dts + BLE=y):
# USB stays alive and keys work, BLE just never advertises. Because USB
# logging survives here, we can read ZMK's own BLE logs over USB serial
# (COM port) to see the error from bt_enable()/bt_le_adv_start().
#
# Deliberately NOT enabling CONFIG_BT_LOG_LEVEL_DBG or CONFIG_BT_SHELL —
# both previously regressed the board into a total hang. We rely on ZMK's
# own LOG_DBG/LOG_ERR from src/ble.c (covered by ZMK_LOG_LEVEL_DBG below).
CONFIG_ZMK_BLE=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
