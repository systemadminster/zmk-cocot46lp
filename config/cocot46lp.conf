# 32 kHz clock: BMP has no external 32 kHz crystal. The RC oscillator
# (K32SRC_RC) hits a known Nordic bug where BLE/MPSL clock calibration
# hangs at boot before USB even enumerates (DevZone thread #84234) —
# switching link layer controller alone did not fix it. Use SYNTH
# instead: 32kHz derived from the 32MHz HFCLK (which the SoC needs
# running anyway for USB), avoiding the RC calibration state machine
# entirely. Costs a bit more power than RC but avoids the hang.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_SYNTH=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# BLE re-enable attempt hung at boot (USB stopped enumerating too).
# Known issue: Nordic's SoftDevice controller (MPSL) hangs waiting for
# LFCLK sync when using the internal 32kHz RC oscillator (no external
# crystal on BMP) — see Nordic DevZone thread #84234. Fix: use
# Zephyr's own BLE link layer instead, which doesn't depend on MPSL.
CONFIG_ZMK_BLE=y
CONFIG_BT_LL_SW_SPLIT=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_MODE_IMMEDIATE=y
