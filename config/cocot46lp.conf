# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# Re-enabled for testing on the older USB-B BMP unit, which is
# confirmed BLE-capable under stock QMK firmware. If BLE works here
# but not on the newer USB-C unit, that points to a hardware/revision
# difference rather than a firmware bug.
CONFIG_ZMK_BLE=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Tried CONFIG_BT_LOG_LEVEL_DBG to see what BLE init is doing — even
# WITHOUT the verbose HCI driver dumps, just this alone regressed us
# back to total silence (no USB either). Passive verbose auto-logging
# in the BT path seems to destabilize something (timing/overhead), so
# instead use an interactive shell: only produces output when WE ask
# for it, no boot-time firehose. Lets us run `bt info`/`bt advertise on`
# on demand to check whether BT actually initialized and just isn't
# advertising, vs never initializing at all.
CONFIG_SHELL=y
CONFIG_BT_SHELL=y
