# 32 kHz clock: BMP has no external 32 kHz crystal.
# Reverted to plain RC (no 250PPM calibration) to exactly match the
# proven-working nrfmicro board (another crystal-less nRF52840 ZMK
# board, zmkfirmware/zmk PR #101) instead of guessing further.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# BLE. nrfmicro's Kconfig.defconfig only sets ZMK_BLE=y (default BT_CTLR,
# no explicit controller override) with plain RC clock and boots fine,
# so drop our BT_LL_SW_SPLIT override and match that exactly.
CONFIG_ZMK_BLE=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
# Reduced buffer/level (testing whether heavy debug logging + BLE
# together were exhausting RAM and causing the boot hang)
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_INF=y
CONFIG_LOG_MODE_IMMEDIATE=y
