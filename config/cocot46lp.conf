# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# PRODUCTION: wireless keyboard over BLE, USB also works when plugged in.
#
# ROOT CAUSE of the historical "BLE=y hangs the whole board" bug: the BMP
# bootloader starts at 0xe0000 (UICR.NRFFW[0] = 0x000e0000), and our storage
# partition used to sit inside that region, so ZMK's first BLE identity/bond
# settings write corrupted the bootloader and killed the boot. Fixed by moving
# storage to 0xd0000 in ble_micro_pro.dts. Do NOT place storage at or above
# 0xe0000.
CONFIG_ZMK_BLE=y

# Keep the chip debug-unlocked across resets (paired with approtect_unlock.c).
CONFIG_NRF_APPROTECT_USE_UICR=y

# ZMK Studio: live keymap editing over USB (GUI, no rebuild needed).
# Requires the studio-rpc-usb-uart snippet in build.yml, a physical layout with
# `keys` (in the overlay), and a &studio_unlock binding in the keymap.
CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# EC11 rotary encoder (rotation -> mouse scroll, see overlay & sensor-bindings).
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# AZ1UBALL trackball (PIM447-compatible, I2C addr 0x0A) via kzyz driver module.
# Selects ZMK_POINTING / I2C / PM_DEVICE automatically.
# fw76: driver back ON, now on TWIM1 (i2c1) — TWIM0+BLE hung the boot.
CONFIG_AZ1UBALL=y

# Deep sleep stays OFF for now: the custom polled kscan driver has no
# PM/wakeup-source support, so the board would enter System OFF after the
# idle timeout and never wake from key presses. Re-enable only after adding
# wakeup support to kscan_duplex.c. (Costs battery life; known trade-off.)
# CONFIG_ZMK_SLEEP=y

# DIAG fw93: deferred logging ON again to locate the key to the LEFT of
# backspace (real cocot46lp has 2 side-by-side center keys). kscan logs
# "KEYSCAN press r=.. c=.." on both phases. Deferred mode only — TWIM +
# CONFIG_LOG_MODE_IMMEDIATE deadlocks the boot. Remove for production.
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
