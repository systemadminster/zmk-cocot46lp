# 32 kHz clock: internal RC oscillator (BMP has no external 32 kHz crystal)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_250PPM=y

# DIAGNOSTIC: disable BLE to isolate USB vs BLE failure
# Remove after confirming USB HID works.
CONFIG_ZMK_BLE=n

# Ensure nrfx POWER driver is active (required for USB VBUS detection on nRF52840)
CONFIG_NRFX_POWER=y
