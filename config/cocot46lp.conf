# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# USB only. The storage_erase.c SYS_INIT hook made the board totally
# unresponsive even with BLE=n, so that approach is abandoned (file
# removed). Back to plain USB-only, known-solid throughout this whole
# project.
CONFIG_ZMK_BLE=n

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Tried generously oversized thread stacks (suspecting stack overflow
# given "works fine until ANY extra feature is added") — this made
# things WORSE (back to total silence), arguing against a simple
# stack-overflow theory, or at least against blanket-increasing every
# stack at once. Reverted to defaults. Known-stable minimal config:
# GPIOTE fix + BLE=y, nothing else. USB and keys work; BLE just never
# advertises.
