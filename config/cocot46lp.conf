# 32 kHz clock: BMP has no external 32 kHz crystal.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# P0.10 (NFC2, used as col6/PIN14) is an NFC antenna pin by default on
# nRF52840 and WILL NOT WORK as GPIO without this config.
# First boot after flashing will write UICR and auto-reset once.
CONFIG_NFCT_PINS_AS_GPIOS=y

# APPROTECT UNLOCK BUILD (BLE off, USB kept alive/usable).
# ST-Link is an HLA adapter and physically cannot reach the nRF52 CTRL-AP,
# so it cannot run the ERASEALL/recover that unlocks APPROTECT. Instead we
# unlock from firmware: approtect_unlock.c writes UICR.APPROTECT = 0x5A
# (HwDisabled) once at boot and resets. With NRF_APPROTECT_USE_UICR, the SoC
# init then disables CTRL-AP APPROTECT on the following boot, giving the
# ST-Link normal SWD/MEM-AP debug access — WITHOUT erasing the UF2 bootloader.
CONFIG_ZMK_BLE=n
CONFIG_NRF_APPROTECT_USE_UICR=y

CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# USB CDC ACM for debug logging over USB serial
CONFIG_LOG=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
